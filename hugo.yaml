# Theme configuration (merged into the site config).

# Register woff2 so resources.GetRemote can resolve the media type of the
# self-hosted webfonts fetched in layouts/_partials/fonts.html.
mediaTypes:
  font/woff2:
    suffixes:
      - woff2

# NOTE: syntax highlighting (markup.highlight) cannot be configured here.
# Hugo merges only a subset of keys from a theme's config, and `markup` is not
# one of them — it must be set in the SITE config. See README.md.
