<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ .Title }}</title>

{{ partial "fonts.html" . }}

<style>
    {{- $stylesheet := resources.Get "style.css" | minify -}}
    {{- $stylesheet.Content | safeCSS }}
    {{- /* Syntax colours load after the base sheet so `.chroma` can clear the
           code block background that `.post-body pre` sets. */ -}}
    {{- with resources.Get "syntax.css" -}}
        {{- (. | minify).Content | safeCSS }}
    {{- end }}
</style>
